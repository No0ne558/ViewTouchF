repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -s -w
        language: system
        files: '\.go$'

      - id: go-vet
        name: go vet (cli module)
        entry: bash -c "cd cli && go vet ./..."
        language: system
        pass_filenames: false
        always_run: true

      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: '\.(c|cc|cpp|cxx|h|hpp)$'

      - id: dart-format
        name: dart format (flutter_ui)
        # Ensure the dart formatter runs with the user's Flutter/Dart and PUB_CACHE
        # Use absolute HOME to avoid environment sanitization issues when hooks run
        entry: bash -c "export PUB_CACHE=\"/home/ariel/.pub-cache\" && export PATH=\"/home/ariel/flutter/bin:/home/ariel/flutter/bin/cache/dart-sdk/bin:/home/ariel/.pub-cache/bin:$PATH\" && cd flutter_ui && /home/ariel/flutter/bin/cache/dart-sdk/bin/dart format ."
        language: system
        files: '\.dart$'
