repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -s -w
        language: system
        files: '\.go$'

      - id: go-vet
        name: go vet (cli module)
        entry: bash -c "cd cli && go vet ./..."
        language: system
        pass_filenames: false
        always_run: true

      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: '\.(c|cc|cpp|cxx|h|hpp)$'

      - id: dart-format
        name: dart format (flutter_ui)
        # Run dart format using either dart on PATH or the Flutter SDK's dart in CI
        entry: bash -c "cd flutter_ui && if command -v dart >/dev/null 2>&1; then dart format .; elif [ -n \"\$FLUTTER_ROOT\" ] && [ -x \"\$FLUTTER_ROOT/bin/cache/dart-sdk/bin/dart\" ]; then \"\$FLUTTER_ROOT/bin/cache/dart-sdk/bin/dart\" format .; else echo 'No Dart found (install Dart or set FLUTTER_ROOT)'; exit 1; fi"
        language: system
        files: '\.dart$'
