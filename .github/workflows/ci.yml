name: CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-daemon:
    name: Build daemon (CMake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          # protobuf C++ compiler plugin (provides /usr/bin/grpc_cpp_plugin)
          sudo apt-get install -y build-essential cmake pkg-config protobuf-compiler protobuf-compiler-grpc libprotobuf-dev libgrpc++-dev libssl-dev libsqlite3-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build vt_daemon
        run: cmake --build build --target vt_daemon -- -j$(nproc)

  build-cli:
    name: Build CLI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Build vtctl
        run: |
          mkdir -p bin
          cd cli
          go build -v -o ../bin/vtctl .

  flutter:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Flutter deps
        working-directory: flutter_ui
        run: flutter pub get
      - name: Analyze
        working-directory: flutter_ui
        run: flutter analyze
      - name: Test
        working-directory: flutter_ui
        run: flutter test
