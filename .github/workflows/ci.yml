name: CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  format:
    name: Format & pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Flutter deps
        working-directory: flutter_ui
        run: flutter pub get
      - name: Install pre-commit and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip clang-format
          pip3 install --user pre-commit
          # make the user's local bin available to subsequent steps
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          pre-commit --version
      - name: Run pre-commit
        run: pre-commit run --all-files

  build-daemon:
    name: Build daemon (CMake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          # protobuf C++ compiler plugin (provides /usr/bin/grpc_cpp_plugin)
          # add CUPS dev package so pkg-config can find 'cups' and its dependencies
          sudo apt-get install -y build-essential cmake pkg-config protobuf-compiler protobuf-compiler-grpc libprotobuf-dev libgrpc++-dev libssl-dev libsqlite3-dev libcups2-dev libavahi-client-dev libgnutls28-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build vt_daemon
        run: cmake --build build --target vt_daemon -- -j$(nproc)

  build-cli:
    name: Build CLI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Build vtctl
        run: |
          mkdir -p bin
          cd cli
          go build -v -o ../bin/vtctl .

  flutter:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Flutter deps
        working-directory: flutter_ui
        run: flutter pub get
      - name: Analyze
        working-directory: flutter_ui
        run: flutter analyze
      - name: Test
        working-directory: flutter_ui
        run: flutter test
